<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Vigas ACI 318</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="p-4 pb-20">
    <div class="max-w-xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">Cálculo de Momento Nominal</h1>
            <p class="text-slate-600 text-sm font-bold uppercase tracking-wider">Sincronización ACI 318</p>
        </header>

        <div class="grid grid-cols-1 gap-6">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                <h2 class="text-lg font-extrabold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="bg-blue-600 w-1.5 h-5 rounded-full"></span>Configuración
                </h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase">Ancho b (cm)</label>
                        <input type="number" id="input-b" oninput="calcularViga()" class="w-full bg-slate-50 border-none rounded-xl p-3 focus:ring-2 focus:ring-blue-500" placeholder="0.00">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase">Altura h (cm)</label>
                        <input type="number" id="input-h" oninput="calcularViga()" class="w-full bg-slate-50 border-none rounded-xl p-3 focus:ring-2 focus:ring-blue-500" placeholder="0.00">
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                <h2 class="text-lg font-extrabold text-slate-800 mb-4">Refuerzo Longitudinal</h2>
                <div class="bg-slate-50 rounded-2xl p-5 flex justify-between items-center border border-blue-100">
                    <div>
                        <p class="text-[9px] font-black text-blue-600 uppercase">Área Total As</p>
                        <input type="number" id="input-as" oninput="calcularViga()" class="text-2xl font-black bg-transparent border-none p-0 w-24 focus:ring-0" placeholder="0.00">
                        <span class="text-xl font-black italic ml-1">cm²</span>
                    </div>
                    <button onclick="location.reload()" class="bg-red-50 text-red-500 text-[10px] font-black px-4 py-2 rounded-lg uppercase">Reiniciar</button>
                </div>
            </div>

            <div class="bg-white rounded-[40px] p-8 text-center border-4 border-white shadow-xl">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-opacity-50">Resistencia de Diseño (ΦMn)</p>
                <div id="resultado-final" class="text-6xl font-black text-slate-800 tracking-tighter">0.00 <span class="text-2xl text-slate-400 italic">t-m</span></div>
                <div class="mt-6 border-t border-slate-100 pt-4 flex justify-center gap-8">
                    <div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Bloque (a)</p>
                        <p id="res-a" class="font-black text-slate-700 uppercase">0 cm</p>
                    </div>
                    <div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Factor Φ</p>
                        <p class="font-black text-slate-700 uppercase">0.900</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calcularViga() {
            const b = parseFloat(document.getElementById('input-b').value) || 0;
            const h = parseFloat(document.getElementById('input-h').value) || 0;
            const As = parseFloat(document.getElementById('input-as').value) || 0;

            if (b > 0 && h > 0 && As > 0) {
                const fc = 210; 
                const fy = 4200;
                const d = h - 4; // Peralte efectivo estimado
                
                // a = (As * fy) / (0.85 * f'c * b)
                const a = (As * fy) / (0.85 * fc * b);
                
                // Mn = As * fy * (d - a/2)
                const Mn = As * fy * (d - (a / 2));
                
                // ΦMn en t-m
                const phiMn = (Mn * 0.9) / 100000;

                document.getElementById('resultado-final').innerHTML = `${phiMn.toFixed(2)} <span class="text-2xl text-slate-400 italic">t-m</span>`;
                document.getElementById('res-a').innerText = `${a.toFixed(2)} cm`;
            } else {
                document.getElementById('resultado-final').innerHTML = `0.00 <span class="text-2xl text-slate-400 italic">t-m</span>`;
                document.getElementById('res-a').innerText = `0 cm`;
            }
        }
    </script>
</body>
</html>
