<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Vigas ACI 318</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="p-4 pb-20">
    <div class="max-w-xl mx-auto space-y-6">
        <header class="text-center py-4">
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">Cálculo de Momento Nominal</h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Sincronización ACI 318</p>
        </header>

        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h2 class="text-sm font-black text-slate-800 uppercase mb-4 flex items-center gap-2">
                <span class="bg-blue-600 w-1.5 h-5 rounded-full"></span>Configuración
            </h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Ancho b (cm)</label>
                    <input type="number" id="input-b" oninput="calcular()" class="w-full bg-slate-50 border-none rounded-xl p-3 focus:ring-2 focus:ring-blue-500" placeholder="0.00">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Altura h (cm)</label>
                    <input type="number" id="input-h" oninput="calcular()" class="w-full bg-slate-50 border-none rounded-xl p-3 focus:ring-2 focus:ring-blue-500" placeholder="0.00">
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h2 class="text-sm font-black text-slate-800 uppercase mb-4 font-black">Refuerzo Longitudinal</h2>
            <div class="bg-slate-50 rounded-2xl p-5 flex justify-between items-center border border-blue-50 border-2">
                <div>
                    <p class="text-[9px] font-black text-blue-600 uppercase">Área Total As</p>
                    <input type="number" id="input-as" oninput="calcular()" class="text-3xl font-black bg-transparent border-none p-0 w-24 focus:ring-0" placeholder="0.00">
                    <span class="text-xl font-black italic ml-1">cm²</span>
                </div>
                <button onclick="location.reload()" class="bg-red-50 text-red-500 text-[10px] font-black px-4 py-2 rounded-lg uppercase">Reset</button>
            </div>
        </div>

        <div class="bg-white rounded-[40px] p-10 text-center shadow-xl border-4 border-white">
            <p class="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Resistencia de Diseño (ΦMn)</p>
            <div id="res-final" class="text-6xl font-black text-slate-900 tracking-tighter">0.00<span class="text-2xl text-slate-300 ml-2 italic">t-m</span></div>
            
            <div class="grid grid-cols-2 mt-8 pt-6 border-t border-slate-50">
                <div>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Bloque (a)</p>
                    <p id="res-a" class="font-black text-slate-700">0.00 cm</p>
                </div>
                <div>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Factor Φ</p>
                    <p class="font-black text-slate-700">0.900</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calcular() {
            const b = parseFloat(document.getElementById('input-b').value) || 0;
            const h = parseFloat(document.getElementById('input-h').value) || 0;
            const As = parseFloat(document.getElementById('input-as').value) || 0;

            if (b > 0 && h > 0 && As > 0) {
                const fc = 210; 
                const fy = 4200;
                const d = h - 4; // Peralte efectivo
                
                const a = (As * fy) / (0.85 * fc * b);
                const Mn = As * fy * (d - (a / 2));
                const phiMn = (Mn * 0.9) / 100000;

                document.getElementById('res-final').innerHTML = phiMn.toFixed(2) + '<span class="text-2xl text-slate-300 ml-2 italic">t-m</span>';
                document.getElementById('res-a').innerText = a.toFixed(2) + ' cm';
            } else {
                document.getElementById('res-final').innerHTML = '0.00<span class="text-2xl text-slate-300 ml-2 italic">t-m</span>';
                document.getElementById('res-a').innerText = '0.00 cm';
            }
        }
    </script>
</body>
</html>
